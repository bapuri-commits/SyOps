# syworkspace.cloud nginx 중앙 설정
# 서버 위치: /etc/nginx/sites-available/services
# 최종 갱신: 2026-03-11
#
# 이 파일은 VPS의 실제 nginx 설정의 Git 관리 사본이다.
# 변경 시: 이 파일 수정 → VPS에 반영 → nginx -t && systemctl reload nginx

# --- QuickDrop ---
server {
    server_name drop.syworkspace.cloud;
    client_max_body_size 500M;
    include /etc/nginx/snippets/security-headers.conf;

    location / {
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/drop.syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drop.syworkspace.cloud/privkey.pem;
}

# --- News_Agent (정적 서빙) ---
server {
    server_name news.syworkspace.cloud;
    include /etc/nginx/snippets/security-headers.conf;

    location / {
        alias /opt/data/news-agent/web/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/drop.syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drop.syworkspace.cloud/privkey.pem;
}

# --- SyOps 포털 ---
server {
    server_name syworkspace.cloud;
    include /etc/nginx/snippets/security-headers.conf;

    root /opt/apps/syops/frontend/dist;
    index index.html;

    # Vite 해시 자산 — 장기 캐싱
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8300;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/drop.syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drop.syworkspace.cloud/privkey.pem;
}

# --- HTTP → HTTPS 리다이렉트 ---
server {
    listen 80;
    server_name drop.syworkspace.cloud news.syworkspace.cloud syworkspace.cloud;
    return 301 https://$host$request_uri;
}

# --- catch-all (알 수 없는 호스트 차단) ---
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/drop.syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drop.syworkspace.cloud/privkey.pem;
    return 444;
}

# 공통 보안 헤더 — 모든 server 블록에서 include
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://*.syworkspace.cloud; font-src 'self'" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

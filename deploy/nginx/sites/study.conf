# --- StudyHub (school_sync + lesson-assist) ---
server {
    listen 443 ssl http2;
    server_name study.syworkspace.cloud;

    ssl_certificate     /etc/letsencrypt/live/syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/syworkspace.cloud/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8203;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SSE 스트리밍 엔드포인트 — 버퍼링 비활성화
    location ~ ^/api/sync/logs {
        proxy_pass http://127.0.0.1:8203;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # AI Q&A SSE 스트리밍
    location = /api/ask {
        proxy_pass http://127.0.0.1:8203;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name study.syworkspace.cloud;
    return 301 https://$host$request_uri;
}

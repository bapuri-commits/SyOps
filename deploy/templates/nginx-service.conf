# nginx server block 템플릿
# 사용법: /etc/nginx/sites-available/<service>.conf 로 저장
#
# 필수 수정:
#   - <SERVICE_NAME> → 서비스명 (주석용)
#   - <SUBDOMAIN> → 서브도메인 (예: app)
#   - <PORT> → 컨테이너 포트 (예: 8201)
#
# 추가 후:
#   ln -s /etc/nginx/sites-available/<service>.conf /etc/nginx/sites-enabled/
#   가비아/Cloudflare DNS에 A 레코드 추가: <SUBDOMAIN> → 46.250.251.82
#   sudo nginx -t && sudo systemctl reload nginx
#   (와일드카드 SSL이므로 certbot 불필요)

# --- <SERVICE_NAME> ---
server {
    listen 443 ssl http2;
    server_name <SUBDOMAIN>.syworkspace.cloud;

    ssl_certificate     /etc/letsencrypt/live/syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/syworkspace.cloud/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    location / {
        proxy_pass http://127.0.0.1:<PORT>;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name <SUBDOMAIN>.syworkspace.cloud;
    return 301 https://$host$request_uri;
}

# nginx server block 템플릿
# 사용법: /etc/nginx/sites-available/services 에 추가
#
# 필수 수정:
#   - <SERVICE_NAME> → 서비스명 (주석용)
#   - <SUBDOMAIN> → 서브도메인 (예: app.syworkspace.cloud)
#   - <PORT> → 컨테이너 포트 (예: 8400)
#
# 추가 후:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d <SUBDOMAIN>.syworkspace.cloud

# --- <SERVICE_NAME> ---
server {
    server_name <SUBDOMAIN>.syworkspace.cloud;
    include /etc/nginx/snippets/security-headers.conf;

    location / {
        proxy_pass http://127.0.0.1:<PORT>;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/drop.syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drop.syworkspace.cloud/privkey.pem;
}

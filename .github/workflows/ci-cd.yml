name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  backend:
    name: Backend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ./backend ruff

      - name: Lint
        run: ruff check backend/

      - name: Import check
        run: python -c "from backend.main import app; print('OK')"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push'
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/apps/syops
            git pull origin main

            # Backend
            cd backend
            if [ ! -d .venv ]; then
              python3 -m venv .venv
            fi
            .venv/bin/pip install -q -e .
            cd ..

            # Frontend
            cd frontend
            npm ci --silent
            npm run build
            cd ..

            # Restart
            sudo systemctl restart syops
            echo "[OK] SyOps deployed at $(date)"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 3
            curl -sf http://127.0.0.1:8300/ || (echo "Health check failed" && exit 1)
            echo "Health check passed"
